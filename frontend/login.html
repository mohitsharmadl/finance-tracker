<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 56px 44px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #1e293b;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: box-shadow 0.2s, transform 0.1s;
        }
        .google-btn:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transform: translateY(-1px);
        }
        .google-btn:active { transform: translateY(0); }
        .google-icon { width: 20px; height: 20px; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
        }
        .error-msg.visible { display: block; }
        .footer-text {
            margin-top: 32px;
            color: #475569;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-.52.07-1.06.07-1.58.01A8.002 8.002 0 0 1 4 12c0-4.42 3.58-8 8-8s8 3.58 8 8c0 4.07-3.06 7.44-7 7.93zM12 6c-1.1 0-2 .9-2 2v4l3.5 2.1.75-1.23L11 11V8c0-.55.45-1 1-1s1 .45 1 1v2.46l2.14 1.28c.29-.47.5-.98.62-1.53.04-.2.07-.4.07-.61V8c0-1.1-.9-2-2-2z"/></svg>
        </div>
        <div class="logo-text">Finance Tracker</div>
        <div class="subtitle">Track your spending, income, and financial health</div>

        <div class="error-msg" id="error-msg">Access denied</div>

        <a href="/auth/google" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </a>

        <div class="footer-text">Your data stays private and secure</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        if (error) {
            const msg = document.getElementById("error-msg");
            msg.classList.add("visible");
            if (error === "not_allowed") msg.textContent = "Your email is not authorized.";
            else if (error === "denied") msg.textContent = "Sign-in was cancelled.";
            else msg.textContent = "Authentication failed. Please try again.";
        }
    </script>
</body>
</html>
